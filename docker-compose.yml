# =============================================
#  Intu 趣学坊 - 生产环境 Docker Compose
# =============================================
#  用法:
#    1. 修改下方 .env 变量（或创建 .env 文件）
#    2. docker compose up -d --build
#    3. 访问 http://服务器IP
# =============================================

services:
  # ===== MySQL 数据库 =====
  mysql:
    image: mysql:8.0
    container_name: intu-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Please set MYSQL_ROOT_PASSWORD in .env.production}
      MYSQL_DATABASE: intu
      MYSQL_CHARSET: utf8mb4
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== NestJS 后端 API =====
  api:
    build:
      context: ./intu-api
      dockerfile: Dockerfile
    container_name: intu-api
    restart: always
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:?Please set MYSQL_ROOT_PASSWORD in .env.production}@mysql:3306/intu
      JWT_SECRET: ${JWT_SECRET:?Please set JWT_SECRET in .env.production}
      JWT_EXPIRES_IN: 7d
      WECHAT_APPID: ${WECHAT_APPID:-}
      WECHAT_SECRET: ${WECHAT_SECRET:-}
      WX_TPL_ORDER_PAID: ${WX_TPL_ORDER_PAID:-}
      WX_TPL_APPLICATION_RESULT: ${WX_TPL_APPLICATION_RESULT:-}
      WX_TPL_CLASS_ASSIGNED: ${WX_TPL_CLASS_ASSIGNED:-}
      WX_TPL_CLASS_STARTED: ${WX_TPL_CLASS_STARTED:-}
      WX_TPL_CHECKIN_SUCCESS: ${WX_TPL_CHECKIN_SUCCESS:-}
      WX_TPL_CLASS_REMINDER: ${WX_TPL_CLASS_REMINDER:-}
      AMAP_KEY: ${AMAP_KEY:-}
      AMAP_SECRET: ${AMAP_SECRET:-}
    volumes:
      - api_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    # 启动时自动同步数据库 schema
    command: >
      sh -c "npx prisma db push --accept-data-loss && node dist/src/main.js"

  # ===== Nginx（前端 + 反代）=====
  nginx:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: intu-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  mysql_data:
    driver: local
  api_uploads:
    driver: local
